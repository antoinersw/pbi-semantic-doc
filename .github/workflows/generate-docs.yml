name: Generate Semantic Model Docs

on:
  push:
    paths:
      - '**.SemanticModel/**'
      - '**.tmdl'
  workflow_dispatch:

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pbi-semantic-doc

      - run: pbi-semantic-doc . --output docs/MODEL.md --quiet

      - uses: actions/upload-artifact@v4
        with:
          name: semantic-model-docs
          path: docs/MODEL.md
